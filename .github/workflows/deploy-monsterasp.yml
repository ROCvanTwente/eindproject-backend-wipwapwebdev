name: Deploy backend to MonsterASP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: windows-latest
    env:
      MONSTERASP_FTP_SERVER: ${{ secrets.MONSTERASP_FTP_SERVER }}
      MONSTERASP_FTP_USERNAME: ${{ secrets.MONSTERASP_FTP_USERNAME }}
      MONSTERASP_FTP_PASSWORD: ${{ secrets.MONSTERASP_FTP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore TemplateJwtProject/TemplateJwtProject.csproj

      - name: Build
        run: dotnet build TemplateJwtProject/TemplateJwtProject.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish TemplateJwtProject/TemplateJwtProject.csproj --configuration Release --no-build --output publish/monsterasp

      - name: Check MonsterASP FTP secrets
        shell: pwsh
        run: |
          $missing = @()
          if ($env:MONSTERASP_FTP_SERVER -eq "") { $missing += "MONSTERASP_FTP_SERVER" }
          if ($env:MONSTERASP_FTP_USERNAME -eq "") { $missing += "MONSTERASP_FTP_USERNAME" }
          if ($env:MONSTERASP_FTP_PASSWORD -eq "") { $missing += "MONSTERASP_FTP_PASSWORD" }

          if ($missing.Count -gt 0) {
            Write-Warning "Skipping FTP deploy. Missing GitHub secrets: $($missing -join ', ')"
          }

      - name: Deploy to MonsterASP
        if: ${{ env.MONSTERASP_FTP_SERVER != '' && env.MONSTERASP_FTP_USERNAME != '' && env.MONSTERASP_FTP_PASSWORD != '' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $localRoot = (Resolve-Path "publish/monsterasp").Path
          $ftpRoot = "ftp://$env:MONSTERASP_FTP_SERVER/wwwroot"
          $credential = [System.Net.NetworkCredential]::new(
            $env:MONSTERASP_FTP_USERNAME,
            $env:MONSTERASP_FTP_PASSWORD
          )

          function Invoke-FtpRequest {
            param(
              [Parameter(Mandatory = $true)][string]$Uri,
              [Parameter(Mandatory = $true)][string]$Method,
              [byte[]]$Body
            )

            $request = [System.Net.FtpWebRequest]::Create($Uri)
            $request.Method = $Method
            $request.Credentials = $credential
            $request.UseBinary = $true
            $request.UsePassive = $true
            $request.KeepAlive = $false

            if ($null -ne $Body) {
              $request.ContentLength = $Body.Length
              $stream = $request.GetRequestStream()
              try {
                $stream.Write($Body, 0, $Body.Length)
              }
              finally {
                $stream.Dispose()
              }
            }

            $response = $request.GetResponse()
            $response.Dispose()
          }

          function ConvertTo-FtpPath {
            param([Parameter(Mandatory = $true)][string]$Path)
            return ($Path -replace "\\", "/").TrimStart("/")
          }

          function Ensure-FtpDirectory {
            param([Parameter(Mandatory = $true)][string]$RelativeDirectory)

            $current = ""
            foreach ($part in (ConvertTo-FtpPath $RelativeDirectory).Split("/", [System.StringSplitOptions]::RemoveEmptyEntries)) {
              $current = if ($current -eq "") { $part } else { "$current/$part" }
              try {
                Invoke-FtpRequest -Uri "$ftpRoot/$current" -Method ([System.Net.WebRequestMethods+Ftp]::MakeDirectory)
              }
              catch {
                # MonsterASP returns an FTP error when the directory already exists.
              }
            }
          }

          function Upload-FtpFile {
            param(
              [Parameter(Mandatory = $true)][string]$LocalPath,
              [Parameter(Mandatory = $true)][string]$RelativePath
            )

            $relativeFtpPath = ConvertTo-FtpPath $RelativePath
            $relativeDirectory = Split-Path $relativeFtpPath -Parent
            if ($relativeDirectory) {
              Ensure-FtpDirectory -RelativeDirectory $relativeDirectory
            }

            $bytes = [System.IO.File]::ReadAllBytes($LocalPath)
            Invoke-FtpRequest -Uri "$ftpRoot/$relativeFtpPath" -Method ([System.Net.WebRequestMethods+Ftp]::UploadFile) -Body $bytes
            Write-Host "Uploaded $relativeFtpPath"
          }

          $appOfflineBody = [System.Text.Encoding]::UTF8.GetBytes(
            "<html><body><h1>Deploying</h1><p>The application is temporarily offline while a new version is deployed.</p></body></html>"
          )

          try {
            Invoke-FtpRequest -Uri "$ftpRoot/app_offline.htm" -Method ([System.Net.WebRequestMethods+Ftp]::UploadFile) -Body $appOfflineBody

            Get-ChildItem -Path $localRoot -File -Recurse | ForEach-Object {
              $relativePath = [System.IO.Path]::GetRelativePath($localRoot, $_.FullName)
              Upload-FtpFile -LocalPath $_.FullName -RelativePath $relativePath
            }
          }
          finally {
            try {
              Invoke-FtpRequest -Uri "$ftpRoot/app_offline.htm" -Method ([System.Net.WebRequestMethods+Ftp]::DeleteFile)
            }
            catch {
              Write-Warning "Could not remove app_offline.htm automatically. Remove it from /wwwroot if the site stays offline."
            }
          }
